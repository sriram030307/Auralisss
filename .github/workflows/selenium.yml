name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint -- --max-warnings=0

      - name: Build
        run: npm run build

      - name: Generate test report
        run: npm run generate:test-report

      - name: Upload test report artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-results-excel
          path: test-results.xlsx
          if-no-files-found: error

  appium-mobile-tests:
    runs-on: ubuntu-latest
    needs: build-and-lint
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Appium test dependencies
        run: |
          npm ci
          cd auralis-appium-tests
          npm install

      - name: Run Appium E2E tests
        run: |
          cd auralis-appium-tests
          npm test || true

      - name: Upload Appium Excel report
        uses: actions/upload-artifact@v4
        with:
          name: appium-mobile-test-report
          path: auralis-appium-tests/reports/Auralis_Mobile_Test_Report.xlsx
          if-no-files-found: warn

  load-testing:
    runs-on: ubuntu-latest
    needs: appium-mobile-tests
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install load test dependencies
        run: |
          cd load-testing
          npm install

      - name: Generate baseline load test report
        run: |
          cd load-testing
          npm run test:baseline

      - name: Upload load test report artifact
        uses: actions/upload-artifact@v4
        with:
          name: baseline-load-test-report
          path: load-testing/reports/Baseline_Load_Test_Report.xlsx
          if-no-files-found: error

  vulnerability-testing:
    runs-on: ubuntu-latest
    needs: load-testing
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install vulnerability test dependencies
        run: |
          cd vulnerability-testing
          npm install

      - name: Generate vulnerability test report
        run: |
          cd vulnerability-testing
          npm run test:vulnerability

      - name: Upload vulnerability test report artifact
        uses: actions/upload-artifact@v4
        with:
          name: vulnerability-test-report
          path: vulnerability-testing/reports/Vulnerability_Test_Report.xlsx
          if-no-files-found: error

  unit-testing:
    runs-on: ubuntu-latest
    needs: vulnerability-testing
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install unit test dependencies
        run: |
          cd unit-testing
          npm install

      - name: Generate unit test report
        run: |
          cd unit-testing
          npm run test:unit

      - name: Upload unit test report artifact
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: unit-testing/reports/Unit_Test_Report.xlsx
          if-no-files-found: error